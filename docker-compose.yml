version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER:     mkchain
      POSTGRES_PASSWORD: mkchain123
      POSTGRES_DB:       mkchain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:       postgresql://mkchain:mkchain123@db:5432/mkchain
      ETHERSCAN_API_KEY:  ${ETHERSCAN_API_KEY}
      BLOCKCYPHER_TOKEN:  ${BLOCKCYPHER_TOKEN}
      FRONTEND_URL:       http://localhost:5173
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
